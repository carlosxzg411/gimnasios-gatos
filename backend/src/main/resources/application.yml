server:
  port: 8080

spring:
  application:
    name: gimnasios-gatos
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss

  mail:
    host: smtp.example.com
    port: 587
    username: dummy
    password: dummy
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: gimnasios-gatos-secret-key-change-in-production-must-be-at-least-256-bits-long
    expiration-ms: 86400000

  email:
    from: no-reply@gimnasiosgatos.com
    fabricante-email: fabricante@gimnasiosgatos.com

  stripe:
    secret-key: sk_test_placeholder
    webhook-secret: whsec_placeholder
