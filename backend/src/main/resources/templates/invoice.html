<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Factura</title></head>
<body style="font-family:Arial,sans-serif;padding:20px;">
<h2>Gracias por tu compra, <span th:text="${cliente.nombre}">Cliente</span></h2>
<p><strong>Pedido #<span th:text="${order.id}">0</span></strong></p>
<p>Fecha: <span th:text="${#temporals.format(order.fecha, 'dd/MM/yyyy HH:mm')}">fecha</span></p>

<table style="width:100%;border-collapse:collapse;margin-top:20px;">
  <thead>
    <tr style="background:#f0f0f0;">
      <th style="padding:10px;border:1px solid #ddd;text-align:left;">Producto</th>
      <th style="padding:10px;border:1px solid #ddd;text-align:center;">Cantidad</th>
      <th style="padding:10px;border:1px solid #ddd;text-align:right;">Precio</th>
      <th style="padding:10px;border:1px solid #ddd;text-align:right;">Subtotal</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="item : ${order.items}">
      <td style="padding:10px;border:1px solid #ddd;" th:text="${item.product.nombre}">Producto</td>
      <td style="padding:10px;border:1px solid #ddd;text-align:center;" th:text="${item.cantidad}">1</td>
      <td style="padding:10px;border:1px solid #ddd;text-align:right;" th:text="${#numbers.formatDecimal(item.precioUnitario, 1, 2)}">0.00</td>
      <td style="padding:10px;border:1px solid #ddd;text-align:right;" th:text="${#numbers.formatDecimal(item.precioUnitario * item.cantidad, 1, 2)}">0.00</td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td colspan="3" style="padding:10px;text-align:right;font-weight:bold;">Total:</td>
      <td style="padding:10px;text-align:right;font-weight:bold;" th:text="${#numbers.formatDecimal(order.total, 1, 2)}">0.00</td>
    </tr>
  </tfoot>
</table>

<p style="margin-top:20px;"><strong>Dirección de envío:</strong><br/><span th:text="${order.direccionEnvio}">dir</span></p>
<p>Método de pago: <span th:text="${order.metodoPago}">pago</span></p>
</body>
</html>
