<nav>
  <a routerLink="/productos" class="logo">
    <span class="logo-icon">🐱</span>
    <span class="logo-text">Gimnasios<span class="logo-highlight">Gato</span></span>
  </a>
  <div class="nav-links">
    <button class="theme-btn" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'">
      {{ theme.isDark() ? '☀️' : '🌙' }}
    </button>
    <a routerLink="/productos" class="nav-link">Productos</a>
    <a routerLink="/custom-request" class="nav-link">Personalizar</a>
    <a routerLink="/cart" class="nav-link cart-link">
      🛒 Carrito
      <span class="cart-badge" *ngIf="cart.getCount() > 0">{{ cart.getCount() }}</span>
    </a>
    <ng-container *ngIf="auth.isLoggedIn(); else loginBlock">
      <div class="user-menu">
        <span class="user-greeting">👋 {{ auth.getUser()?.nombre }}</span>
        <a *ngIf="auth.isAdmin()" routerLink="/admin" class="nav-link admin-link">Panel Admin</a>
        <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
      </div>
    </ng-container>
    <ng-template #loginBlock>
      <a routerLink="/login" class="nav-link">Ingresar</a>
      <a routerLink="/register" class="btn-register">Registrarse</a>
    </ng-template>
  </div>
</nav>
