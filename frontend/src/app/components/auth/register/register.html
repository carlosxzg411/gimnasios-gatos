<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-icon">🐱</span>
      <h2>Crear cuenta</h2>
      <p>Regístrate y empieza a comprar</p>
    </div>
    <form (ngSubmit)="onSubmit()" #regForm="ngForm">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="nombre" name="nombre" required placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required email placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" required minlength="6" placeholder="Mín. 6 caracteres">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Dirección</label>
          <input type="text" [(ngModel)]="direccion" name="direccion" placeholder="Tu dirección">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" [(ngModel)]="telefono" name="telefono" placeholder="+57 300...">
        </div>
      </div>
      <p *ngIf="error" class="error-msg">{{ error }}</p>
      <button type="submit" class="btn-primary">Crear cuenta</button>
      <p class="auth-link">¿Ya tienes cuenta? <a routerLink="/login">Ingresa aquí</a></p>
    </form>
  </div>
</div>
