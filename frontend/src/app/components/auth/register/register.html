<div class="auth-container">
  <h2>Registrarse</h2>
  <form (ngSubmit)="onSubmit()" #regForm="ngForm">
    <div class="form-group"><label>Nombre</label><input type="text" [(ngModel)]="nombre" name="nombre" required></div>
    <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="email" name="email" required email></div>
    <div class="form-group"><label>Contraseña</label><input type="password" [(ngModel)]="password" name="password" required minlength="6"></div>
    <div class="form-group"><label>Dirección</label><input type="text" [(ngModel)]="direccion" name="direccion"></div>
    <div class="form-group"><label>Teléfono</label><input type="text" [(ngModel)]="telefono" name="telefono"></div>
    <p *ngIf="error" class="error">{{ error }}</p>
    <button type="submit">Registrarse</button>
    <p>¿Ya tienes cuenta? <a routerLink="/login">Ingresa</a></p>
  </form>
</div>
