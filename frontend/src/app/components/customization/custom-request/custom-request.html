<div class="custom-wrapper">
  <div class="custom-header">
    <span class="custom-icon">🛠️</span>
    <h2>Personaliza tu Gimnasio</h2>
    <p>¿No encuentras lo que buscas? Cuéntanos qué necesitas y te haremos un diseño a tu medida.</p>
  </div>

  <div class="custom-card">
    <div class="form-group">
      <label>Describe tu idea</label>
      <textarea [(ngModel)]="descripcion" rows="5" placeholder="Tamaño, colores, materiales, funciones especiales..."></textarea>
    </div>
    <div class="form-group">
      <label>¿Te interesa algún producto en particular?</label>
      <input [(ngModel)]="productoInteres" placeholder="Opcional — nombre del producto">
    </div>
    <p *ngIf="error" class="error-msg">{{ error }}</p>
    <p *ngIf="success" class="success-msg">{{ success }}</p>
    <button (click)="submit()" class="btn-submit">Enviar Solicitud</button>
  </div>

  <div class="history" *ngIf="requests.length > 0">
    <h3>📋 Mis Solicitudes</h3>
    <div class="request-card" *ngFor="let r of requests">
      <div class="request-header">
        <strong>{{ r.productoInteres || 'Personalizado' }}</strong>
        <span class="request-status" [class.pending]="r.estado === 'PENDIENTE'"
              [class.approved]="r.estado === 'APROBADO'"
              [class.rejected]="r.estado === 'RECHAZADO'">{{ r.estado }}</span>
      </div>
      <p class="request-desc">{{ r.descripcion }}</p>
      <small class="request-date">{{ r.fecha | date:'short' }}</small>
    </div>
  </div>
</div>
