<div class="admin-section">
  <div class="section-header">
    <h3>📦 Productos</h3>
    <button (click)="newProduct()" class="btn-new">+ Nuevo Producto</button>
  </div>

  <form *ngIf="editing" (ngSubmit)="save()" #productForm="ngForm" class="product-form">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input [(ngModel)]="form.nombre" name="nombre" required>
      </div>
      <div class="form-group">
        <label>Precio</label>
        <input type="number" step="0.01" [(ngModel)]="form.precio" name="precio" required>
      </div>
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea [(ngModel)]="form.descripcion" name="descripcion" rows="3"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tamaño</label>
        <select [(ngModel)]="form.tamano" name="tamano">
          <option value="">Seleccionar</option>
          <option>Pequeño</option><option>Mediano</option><option>Grande</option>
        </select>
      </div>
      <div class="form-group">
        <label>Color</label>
        <input [(ngModel)]="form.color" name="color">
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <input [(ngModel)]="form.material" name="material">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Stock</label>
        <input type="number" [(ngModel)]="form.stock" name="stock">
      </div>
      <div class="form-group">
        <label>Imagen URL</label>
        <input [(ngModel)]="form.imagenUrl" name="imagenUrl" placeholder="https://...">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-save">{{ editId ? 'Actualizar' : 'Crear' }}</button>
      <button type="button" (click)="cancel()" class="btn-cancel">Cancelar</button>
    </div>
  </form>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Producto</th><th>Precio</th><th>Tamaño</th><th>Stock</th><th>Acciones</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of products">
          <td class="td-product">
            <img [src]="p.imagenUrl" class="td-thumb" *ngIf="p.imagenUrl">
            {{ p.nombre }}
          </td>
          <td>${{ p.precio }}</td>
          <td><span class="badge-size">{{ p.tamano }}</span></td>
          <td><span class="stock-badge" [class.ok]="p.stock > 5" [class.low]="p.stock > 0 && p.stock <= 5" [class.out]="p.stock === 0">{{ p.stock }}</span></td>
          <td class="td-actions">
            <button (click)="edit(p)" class="btn-edit">✏️</button>
            <button (click)="delete(p.id)" class="btn-delete">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
