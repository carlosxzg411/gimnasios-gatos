<div class="admin-section">
  <div class="header"><h3>Productos</h3><button (click)="newProduct()">+ Nuevo</button></div>

  <form *ngIf="editing" (ngSubmit)="save()" #productForm="ngForm" class="product-form">
    <div><label>Nombre</label><input [(ngModel)]="form.nombre" name="nombre" required></div>
    <div><label>Descripción</label><textarea [(ngModel)]="form.descripcion" name="descripcion"></textarea></div>
    <div><label>Precio</label><input type="number" step="0.01" [(ngModel)]="form.precio" name="precio" required></div>
    <div><label>Tamaño</label><select [(ngModel)]="form.tamano" name="tamano"><option>Pequeño</option><option>Mediano</option><option>Grande</option></select></div>
    <div><label>Color</label><input [(ngModel)]="form.color" name="color"></div>
    <div><label>Material</label><input [(ngModel)]="form.material" name="material"></div>
    <div><label>Stock</label><input type="number" [(ngModel)]="form.stock" name="stock"></div>
    <div><label>Imagen URL</label><input [(ngModel)]="form.imagenUrl" name="imagenUrl"></div>
    <button type="submit">{{ editId ? 'Actualizar' : 'Crear' }}</button>
    <button type="button" (click)="cancel()">Cancelar</button>
  </form>

  <table>
    <thead><tr><th>Nombre</th><th>Precio</th><th>Tamaño</th><th>Stock</th><th>Acciones</th></tr></thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td>{{ p.nombre }}</td><td>${{ p.precio }}</td><td>{{ p.tamano }}</td><td>{{ p.stock }}</td>
        <td><button (click)="edit(p)">Editar</button> <button (click)="delete(p.id)" class="danger">Eliminar</button></td>
      </tr>
    </tbody>
  </table>
</div>
