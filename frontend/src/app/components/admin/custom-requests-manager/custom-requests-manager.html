<h3>Solicitudes de Personalización</h3>
<table>
  <thead><tr><th>#</th><th>Usuario</th><th>Producto Interés</th><th>Descripción</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr></thead>
  <tbody>
    <tr *ngFor="let r of requests">
      <td>{{ r.id }}</td><td>{{ r.usuario?.nombre }}</td><td>{{ r.productoInteres || '-' }}</td>
      <td>{{ r.descripcion }}</td><td>{{ r.estado }}</td><td>{{ r.fecha | date:'short' }}</td>
      <td>
        <select (change)="updateStatus(r.id, $any($event.target).value)" [value]="r.estado">
          <option>PENDIENTE</option><option>EN_REVISION</option><option>RESPONDIDO</option><option>CERRADO</option>
        </select>
      </td>
    </tr>
  </tbody>
</table>
