<div class="admin-section">
  <div class="section-header">
    <h3>📋 Pedidos</h3>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>#</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of orders">
          <td class="td-id">#{{ o.id }}</td>
          <td>{{ o.usuario?.nombre }}</td>
          <td class="td-price">${{ o.total }}</td>
          <td><span class="order-status" [class.pendiente]="o.estado === 'PENDIENTE'"
                [class.pagado]="o.estado === 'PAGADO'"
                [class.enviado]="o.estado === 'ENVIADO'"
                [class.entregado]="o.estado === 'ENTREGADO'"
                [class.cancelado]="o.estado === 'CANCELADO'">{{ o.estado }}</span></td>
          <td class="td-date">{{ o.fecha | date:'short' }}</td>
          <td>
            <select (change)="updateStatus(o.id, $any($event.target).value)" [value]="o.estado" class="status-select">
              <option>PENDIENTE</option><option>PAGADO</option><option>ENVIADO</option><option>ENTREGADO</option><option>CANCELADO</option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
