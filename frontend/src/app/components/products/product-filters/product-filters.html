<div class="filters-bar">
  <div class="filters-row">
    <div class="filter-group">
      <label>Tamaño</label>
      <select [(ngModel)]="tamano">
        <option value="">Todos</option>
        <option>Pequeño</option>
        <option>Mediano</option>
        <option>Grande</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Color</label>
      <select [(ngModel)]="color">
        <option value="">Todos</option>
        <option>Beige</option>
        <option>Gris</option>
        <option>Crema</option>
        <option>Natural</option>
        <option>Blanco</option>
        <option>Negro</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Tipo</label>
      <select [(ngModel)]="material">
        <option value="">Todos</option>
        <option>Sisal</option>
        <option>MDF</option>
        <option>Cartón</option>
        <option>Madera</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Precio min</label>
      <input type="number" [(ngModel)]="precioMin" placeholder="$0">
    </div>
    <div class="filter-group">
      <label>Precio max</label>
      <input type="number" [(ngModel)]="precioMax" placeholder="$999">
    </div>
    <div class="filter-actions">
      <button class="btn-apply" (click)="apply()">Filtrar</button>
      <button class="btn-clear" (click)="clear()">Limpiar</button>
    </div>
  </div>
</div>
