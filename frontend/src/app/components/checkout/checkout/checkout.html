<h2>Checkout</h2>
<div class="checkout">
  <div class="order-summary">
    <h3>Resumen del pedido</h3>
    <div *ngFor="let item of items">
      <p>{{ item.product.nombre }} x {{ item.cantidad }} = ${{ (item.product.precio * item.cantidad).toFixed(2) }}</p>
    </div>
    <h4>Total: ${{ cart.getTotal().toFixed(2) }}</h4>
  </div>
  <div class="form">
    <div class="form-group">
      <label>Dirección de envío</label>
      <textarea [(ngModel)]="direccionEnvio" required rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Método de pago</label>
      <select [(ngModel)]="metodoPago">
        <option value="stripe">Tarjeta (Stripe)</option>
        <option value="transferencia">Transferencia bancaria</option>
      </select>
    </div>
    <p *ngIf="error" class="error">{{ error }}</p>
    <button (click)="submit()">Confirmar y Pagar</button>
  </div>
</div>
